<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Veradmin</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #11182b;
      --muted: #9fb0cc;
      --text: #e8eefb;
      --accent: #5ea1ff;
      --warn: #f7c56b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #16213c 0%, var(--bg) 58%);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      color: var(--text);
    }
    .card {
      width: min(560px, calc(100vw - 32px));
      background: rgba(17, 24, 43, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.38);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.15;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 14px;
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-right: 8px;
      background: var(--warn);
      animation: pulse 1.1s infinite ease-in-out;
    }
    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.65; }
      50% { transform: scale(1.22); opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Launching Veradmin</h1>
    <p>The desktop shell is starting the local workspace server.</p>
    <div class="status" id="status">
      <span class="dot"></span>
      Waiting for local runtime at <code>http://127.0.0.1:3210</code>
    </div>
    <div class="hint" id="hint">
      If startup takes longer than expected, keep this window open while the local runtime finishes booting.
    </div>
  </main>

  <script>
    const baseUrl = "http://127.0.0.1:3210";
    const statusEl = document.getElementById("status");
    const hintEl = document.getElementById("hint");
    const deadline = Date.now() + 90000;

    async function probe() {
      try {
        const response = await fetch(baseUrl + "/api/workspace", { cache: "no-store" });
        if (response.ok) {
          statusEl.textContent = "Local runtime is ready. Opening Veradmin…";
          window.location.replace(baseUrl + "/");
          return;
        }
      } catch {
      }

      if (Date.now() > deadline) {
        statusEl.textContent = "The local runtime is taking longer than expected to respond.";
        hintEl.textContent = "Close and reopen the app after checking whether the packaged local server assets were staged correctly.";
        return;
      }

      setTimeout(probe, 700);
    }

    probe();
  </script>
</body>
</html>
